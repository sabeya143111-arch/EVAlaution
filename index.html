<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Swag Login — Pixel Animation Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080A0E; --surface:#0E1117; --surface2:#151B24; --border:#1E2A3A;
  --border2:#243040; --text:#E8EDF5; --muted:#4A6080; --muted2:#6A8090;
  --accent:#00D9FF; --accent2:#0099CC; --purple:#8B5CF6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;}

/* ===== LOGIN SCREEN ===== */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;position:relative;z-index:10;}

.login-bg{position:absolute;inset:0;background:linear-gradient(135deg,#080A0E 0%,#0E1520 50%,#080A0E 100%);z-index:0;}

/* pixel canvas sits above the gradient, below the card */
#login-canvas{position:absolute;inset:0;z-index:1;display:block;}

/* vignette: pixels strongest in middle, fade out at edges */
.login-vignette{
  position:absolute;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(circle at center,transparent 0%,var(--bg) 78%);
  opacity:0.85;
}

.login-card{
  position:relative;z-index:3;
  background:rgba(14,17,23,0.72);
  backdrop-filter:blur(16px);
  border:1px solid var(--border2);
  border-radius:24px;padding:56px 48px;text-align:center;
  max-width:420px;width:90%;
  box-shadow:0 0 80px rgba(0,217,255,0.06),0 40px 80px rgba(0,0,0,0.4);
  animation:loginFade 0.6s ease;
}
@keyframes loginFade{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.login-logo-wrap{
  width:72px;height:72px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:20px;display:flex;align-items:center;justify-content:center;
  margin:0 auto 28px;font-family:'Space Mono',monospace;font-size:28px;font-weight:700;
  color:#080A0E;box-shadow:0 0 40px rgba(0,217,255,0.3);
}
.login-brand{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:4px;color:var(--accent);text-transform:uppercase;margin-bottom:12px;}

/* shimmer glass title */
.login-title{
  font-size:28px;font-weight:700;line-height:1.2;margin-bottom:8px;
  background:linear-gradient(135deg,#ffffff 0%,rgba(0,217,255,0.55) 22%,rgba(0,217,255,0.15) 42%,#ffffff 55%,rgba(0,217,255,0.4) 75%,#ffffff 100%);
  background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  -webkit-text-stroke:0.4px rgba(255,255,255,0.12);
  animation:titleShimmer 6s linear infinite;
}
@keyframes titleShimmer{0%{background-position:200% center}100%{background-position:0% center}}

.login-divider{width:40px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:0 auto 36px;}
.login-sub{font-size:14px;color:var(--muted2);margin-bottom:36px;line-height:1.6;}

.login-btn{
  width:100%;padding:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:14px;color:#080A0E;font-family:'Space Grotesk',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:12px;transition:all 0.2s;letter-spacing:0.3px;
  box-shadow:0 8px 30px rgba(0,217,255,0.25);
}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,217,255,0.4);}
.login-btn:active{transform:translateY(0);}

@media (prefers-reduced-motion: reduce){
  .login-title{animation:none;background-position:0 center;}
}
</style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <div class="login-bg"></div>
  <canvas id="login-canvas"></canvas>
  <div class="login-vignette"></div>

  <div class="login-card">
    <div class="login-logo-wrap">S</div>
    <div class="login-brand">Swag Group</div>
    <div class="login-title">Maintenance<br>Control Center</div>
    <div class="login-divider"></div>
    <div class="login-sub">Sign in with your Microsoft account to access the maintenance management dashboard.</div>
    <button class="login-btn" onclick="alert('Preview only — real login MSAL se chalega')">
      <svg width="18" height="18" viewBox="0 0 23 23"><path d="M1 1h10v10H1V1z" fill="#f25022"/><path d="M12 1h10v10H12V1z" fill="#7fba00"/><path d="M1 12h10v10H1V12z" fill="#00a4ef"/><path d="M12 12h10v10H12V12z" fill="#ffb900"/></svg>
      Continue with Microsoft
    </button>
  </div>
</div>

<script>
/* =========================================================================
 * VANILLA PIXEL RIPPLE CANVAS  (ported from the React PixelHero component)
 * - radial staggered "appear" ripple from center
 * - shimmer once pixels reach max size
 * ========================================================================= */
function makePixelCanvas(canvas, opts){
  opts = opts || {};
  const ctx = canvas.getContext('2d');
  const colors = opts.colors || ['#2A3A52','#2A3A52','#1E2A3A','#324560','#00D9FF'];
  const gap = opts.gap || 6;
  const speed = (Math.min(opts.speed || 30, 100)) * 0.001;
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let pixels = [];
  let raf = 0;
  let last = performance.now();

  const rand = (a,b) => Math.random()*(b-a)+a;

  function createPixel(x,y,color,delay){
    return {
      x,y,color,
      speed: rand(0.08,0.4)*speed,
      size: 0,
      sizeStep: rand(0.12,0.28),
      minSize: 0.5,
      maxSizeInt: 2,
      maxSize: rand(0.5,2),
      delay,
      counter: 0,
      counterStep: rand(1.8,3.2) + (canvas.width + canvas.height)*0.008,
      isIdle:false, isReverse:false, isShimmer:false,
      draw(){
        const o = this.maxSizeInt*0.5 - this.size*0.5;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x + o, this.y + o, this.size, this.size);
      },
      appear(){
        this.isIdle = false;
        if(this.counter <= this.delay){ this.counter += this.counterStep; return; }
        if(this.size >= this.maxSize) this.isShimmer = true;
        if(this.isShimmer) this.shimmer();
        else this.size += this.sizeStep;
        this.draw();
      },
      shimmer(){
        if(this.size >= this.maxSize) this.isReverse = true;
        else if(this.size <= this.minSize) this.isReverse = false;
        if(this.isReverse) this.size -= this.speed;
        else this.size += this.speed;
      }
    };
  }

  function init(){
    const host = canvas.parentElement;
    const r = host.getBoundingClientRect();
    const w = Math.floor(r.width), h = Math.floor(r.height);
    if(w === 0 || h === 0) return;          // hidden container -> skip
    canvas.width = w; canvas.height = h;
    pixels = [];
    for(let x=0; x<w; x+=gap){
      for(let y=0; y<h; y+=gap){
        const color = colors[Math.floor(Math.random()*colors.length)];
        const dx = x - w/2, dy = y - h/2;
        const delay = reduce ? 0 : Math.sqrt(dx*dx + dy*dy) * 0.65;
        pixels.push(createPixel(x,y,color,delay));
      }
    }
  }

  function loop(){
    raf = requestAnimationFrame(loop);
    const now = performance.now();
    if(now - last < 1000/60) return;
    last = now;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(const p of pixels) p.appear();
  }

  init();
  const ro = new ResizeObserver(init);
  ro.observe(canvas.parentElement);
  raf = requestAnimationFrame(loop);

  return () => { cancelAnimationFrame(raf); ro.disconnect(); };
}

// boot
makePixelCanvas(document.getElementById('login-canvas'), { gap:6, speed:35 });
</script>
</body>
</html>
